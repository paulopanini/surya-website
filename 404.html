<script>
  // GitHub Pages SPA redirect: store the intended path in sessionStorage and go to root.
  var KNOWN = ['/', '/portfolio', '/music', '/press', '/about', '/contact', '/shop', '/work-with-me'];

    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
