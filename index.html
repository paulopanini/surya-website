<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surya Amitrano — Refined</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Caveat+Brush&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: Fraunces, Georgia, serif;
    color: #2f2a22;
    background: #f9e6c6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="refined.jsx"></script>
<script type="text/babel" src="pages-refined.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

function Lightbox({ item, onClose, onPrev, onNext }) {
  useEffect(() => {
    if (!item) return;
    const h = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') onPrev();
      if (e.key === 'ArrowRight') onNext();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [item, onClose, onPrev, onNext]);
  if (!item) return null;
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(20,18,14,.82)', zIndex: 100,
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40,
      animation: 'fadeIn .2s ease',
    }}>
      <style>{`@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }`}</style>
      <button onClick={(e) => { e.stopPropagation(); onPrev(); }} style={navBtn(16)}><Icon name="arrow-left" size={20} /></button>
      <div onClick={(e) => e.stopPropagation()} style={{ maxWidth: 720, width: '100%' }}>
        {item.image
          ? <img src={item.image} alt={item.title} style={{ display: 'block', width: '100%', maxHeight: '78vh', objectFit: 'contain', borderRadius: 4 }} />
          : <PaletteTile palette={item.palette} label={item.title} sub={`${item.client} · ${item.year}`} style={{ aspectRatio: '4/5', maxHeight: '78vh' }} />}
        <div style={{ marginTop: 16, color: '#f9e6c6', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div>
            <div style={{ fontFamily: '"DM Serif Display", Georgia, serif', fontSize: 28 }}>{item.title}</div>
            <div style={{ fontFamily: 'ui-monospace, monospace', fontSize: 11, letterSpacing: '.15em', textTransform: 'uppercase', opacity: .7, marginTop: 4 }}>{item.client} · {item.year} · {item.cat}</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#f9e6c6', cursor: 'pointer', fontFamily: 'Fraunces', fontStyle: 'italic', fontSize: 15 }}>close ✕</button>
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onNext(); }} style={navBtn(16, true)}><Icon name="arrow-right" size={20} /></button>
    </div>
  );
}
const navBtn = (inset, right) => ({
  position: 'fixed',
  [right ? 'right' : 'left']: inset,
  top: '50%', transform: 'translateY(-50%)',
  width: 48, height: 48, borderRadius: 999,
  background: 'rgba(249,230,198,.12)', border: '1px solid rgba(249,230,198,.3)', color: '#f9e6c6',
  cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
});

function RefinedSite() {
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem('surya-refined-page') || 'home'; } catch { return 'home'; }
  });
  const [lb, setLb] = useState(null);
  const { lang, setLang, t } = useI18n();
  useEffect(() => { try { localStorage.setItem('surya-refined-page', page); } catch {} }, [page]);
  const goTo = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const openLb = (item) => setLb(item);
  const lbIdx = lb ? PORTFOLIO.findIndex(x => x.id === lb.id) : -1;
  const pageMap = {
    home: <RHome onNav={goTo} t={t} />,
    portfolio: <RPortfolio onOpen={openLb} t={t} />,
    music: <RMusic t={t} />,
    press: <RPress t={t} />,
    about: <RAbout t={t} />,
    contact: <RContact t={t} />,
    shop: <RShop t={t} />,
  };
  return (
    <div style={{ background: RP.paper, minHeight: '100vh', color: RP.ink, fontFamily: 'Fraunces, Georgia, serif' }}>
      <RefinedHeader page={page} onNav={goTo} lang={lang} setLang={setLang} t={t} />
      <main key={page} style={{ animation: 'pageIn .45s ease' }}>
        <style>{`@keyframes pageIn { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }`}</style>
        {pageMap[page]}
      </main>
      <RefinedFooter onNav={goTo} t={t} />
      <Lightbox item={lb} onClose={() => setLb(null)}
        onPrev={() => setLb(PORTFOLIO[(lbIdx - 1 + PORTFOLIO.length) % PORTFOLIO.length])}
        onNext={() => setLb(PORTFOLIO[(lbIdx + 1) % PORTFOLIO.length])} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RefinedSite />);
</script>
</body>
</html>
